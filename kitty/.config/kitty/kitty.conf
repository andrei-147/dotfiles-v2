# ============================================================================
# KITTY TERMINAL CONFIGURATION
# ============================================================================

# Enable shell integration for enhanced features (command tracking, etc.)
shell_integration enabled

confirm_os_window_close 0

# ============================================================================
# PERFORMANCE OPTIMIZATION
# ============================================================================
# Lower repaint delay for smoother rendering (default: 10ms)
repaint_delay 10

# Reduce input lag for better responsiveness (default: 3ms)
input_delay 3

# Sync screen redraws to monitor refresh rate
sync_to_monitor yes

# ============================================================================
# CURSOR SETTINGS
# ============================================================================
# Number of past cursor positions to trail (visual effect)
cursor_trail 3

# How quickly cursor trail fades (start_opacity end_opacity)
cursor_trail_decay 0.1 0.4

# ============================================================================
# WINDOW APPEARANCE
# ============================================================================
# Thin 1-point border around windows
window_border_width 1pt

# Use minimal border style (no thick decorations)
draw_minimal_borders yes

# Hide OS window decorations (title bar, etc.)
hide_window_decorations yes

# Border colors for focused/unfocused windows
active_border_color #00ff00  
inactive_border_color #282828

# ============================================================================
# WINDOW SIZING & BEHAVIOR
# ============================================================================
# Don't remember previous window size
remember_window_size no

# Default window dimensions (for quake-style terminal)
initial_window_width 800
initial_window_height 500

# Start in windowed mode (not fullscreen)
startup_mode windowed

# Spacing around window content
window_margin_width 5
single_window_margin_width 0
window_padding_width 2

# Dim inactive window text to 70% opacity
inactive_text_alpha 0.7

# ============================================================================
# TILING LAYOUTS
# ============================================================================
# Enable multiple tiling layouts for cycling and advanced window management
enabled_layouts splits,stack,tall,fat,grid,horizontal,vertical

# ============================================================================
# TRANSPARENCY & BLUR
# ============================================================================
# Make background 95% opaque (5% transparent)
background_opacity 0.70

# Dim opacity for inactive content
dim_opacity 0.90

# Apply slight blur to background
background_blur 1

# ============================================================================
# FONTS
# ============================================================================
# Primary font family
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

# Base font size
font_size 13.0

# Keep ligatures enabled for programming fonts
disable_ligatures never

# Font size adjustment keybindings
map ctrl+equal  change_font_size all +2.0
map ctrl+minus  change_font_size all -2.0
map ctrl+0       change_font_size all 0

# ============================================================================
# URL HANDLING
# ============================================================================
# Underline URLs with curly style
url_style curly

# Open URLs with default system browser
open_url_with default

# Recognize these URL schemes
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh

# Enable automatic URL detection
detect_urls yes

# Allow clickable hyperlinks
allow_hyperlinks yes

# Open URL hints with keyboard shortcut (using existing kitty_mod if defined)
map ctrl+shift+u open_url_with_hints

# ============================================================================
# THEME & COLORS
# ============================================================================
# Main theme (Catppuccin Mocha)
include 'Tango Dark.conf'

# Additional theme includes (commented out)
# include tabs.conf

# ============================================================================
# TAB BAR CONFIGURATION
# ============================================================================
tab_bar_edge top
tab_bar_margin_width 1.0
tab_bar_margin_height 1.0 0.5
tab_bar_style powerline
tab_powerline_style angled
tab_title_template "{index}: {title}"

# Workspace naming (tab titles)
active_tab_title_template "[{index}: {title}]"
tab_fade 0.25 0.5 0.75 1

# styling tabs
active_tab_font_style bold-italic
inactive_tab_font_style normal

# ============================================================================
# kitty_mod
# ============================================================================
kitty_mod alt

# ============================================================================
# TABS
# ============================================================================
map alt+t        new_tab
map alt+w        close_tab
map alt+1        goto_tab 1
map alt+2        goto_tab 2
map alt+3        goto_tab 3
map alt+4        goto_tab 4
map alt+5        goto_tab 5
map alt+6        goto_tab 6
map alt+7        goto_tab 7
map alt+8        goto_tab 8
map alt+9        goto_tab 9
map alt+0        goto_tab 10
map alt+]        next_tab
map alt+[        previous_tab
map alt+shift+.  move_tab_forward
map alt+shift+,  move_tab_backward
map alt+n        new_tab_with_cwd

# ============================================================================
# SPLITS / WINDOWS
# ============================================================================
map alt+-        launch --cwd=current --location=hsplit
map alt+\        launch --cwd=current --location=vsplit
map alt+enter    new_window_with_cwd
map alt+x        close_window
map alt+shift+x  detach_window

# Navigate panes (vim-style)
map alt+h        neighboring_window left
map alt+l        neighboring_window right
map alt+k        neighboring_window up
map alt+j        neighboring_window down

# Move panes
map alt+shift+h  move_window left
map alt+shift+l  move_window right
map alt+shift+k  move_window up
map alt+shift+j  move_window down

# Resize panes
map alt+r        start_resizing_window
map ctrl+alt+h   resize_window narrower 3
map ctrl+alt+l   resize_window wider 3
map ctrl+alt+k   resize_window taller 3
map ctrl+alt+j   resize_window shorter 3

# Focus by number
map alt+ctrl+1   first_window
map alt+ctrl+2   second_window
map alt+ctrl+3   third_window
map alt+ctrl+4   fourth_window
map alt+ctrl+5   fifth_window
map alt+ctrl+6   sixth_window
map alt+ctrl+7   seventh_window
map alt+ctrl+8   eighth_window
map alt+ctrl+9   ninth_window

# Swap focused window
map alt+s        swap_with_window

# ============================================================================
# LAYOUTS
# ============================================================================
map alt+space       toggle_layout stack
map alt+shift+space next_layout
map alt+f           toggle_fullscreen
map alt+shift+r     reset_window_sizes

map ctrl+alt+t   goto_layout tall
map ctrl+alt+s   goto_layout stack
map ctrl+alt+f   goto_layout fat
map ctrl+alt+g   goto_layout grid
map ctrl+alt+p   goto_layout splits

# ============================================================================
# OS WINDOWS
# ============================================================================
map ctrl+alt+n   new_os_window
map ctrl+alt+w   close_os_window
map ctrl+alt+]   next_os_window
map ctrl+alt+[   previous_os_window

# ============================================================================
# SCROLLBACK
# ============================================================================
map alt+u        scroll_line_up
map alt+d        scroll_line_down
map alt+shift+u  scroll_home
map alt+shift+d  scroll_end
map ctrl+alt+u   scroll_to_prompt -1
map ctrl+alt+d   scroll_to_prompt 1

# Scrollback in nvim
action_alias kitty_scrollback_nvim kitten $HOME/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
map alt+/        kitty_scrollback_nvim
map alt+shift+/  kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# ============================================================================
# CLIPBOARD
# ============================================================================
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard
map shift+insert     paste_from_clipboard
map ctrl+alt+c       copy_to_buffer a
map ctrl+alt+v       paste_from_buffer a

# ============================================================================
# MISC
# ============================================================================
map alt+b            kitten broadcast
map alt+shift+escape kitty_shell window
map alt+shift+delete clear_terminal reset active
map ctrl+alt+r       load_config_file
map ctrl+alt+,       edit_config_file

# ============================================================================
# MOUSE
# ============================================================================
mouse_map left   click    ungrabbed mouse_click_url_or_select
mouse_map left   doublepress ungrabbed mouse_selection word
mouse_map left   triplepress ungrabbed mouse_selection line
mouse_map middle press    ungrabbed paste_from_selection
mouse_map right  press    ungrabbed show_command_output

# ============================================================================
# REMOTE CONTROL
# ============================================================================
allow_remote_control yes
listen_on unix:/tmp/kitty.sock

# Save current session
map alt+shift+s save_as_session --save-only --use-foreground-process ~/.config/kitty/last-session.kitty

startup_session ~/.config/kitty/last-session.kitty
